# 事实保护模式

## 概述

定义需要保护的事实模式，确保改写过程中不破坏关键信息。

## 保护模式

### 伏笔标记

- 模式: `【伏笔[0-9]+】`
- 说明: 伏笔编号标记必须完整保留
- 示例: `【伏笔1】`, `【伏笔12】`

### 状态卡

- 模式: `状态卡[：:][^。\n]{10,50}`
- 说明: 状态卡数值必须保留
- 示例: `状态卡：力量+5，敏捷-2`

### 关键事件

- 说明: 从fact_lock中提取的关键事件必须保留
- 类型: 字符串列表
- 示例: ["主角获得宝剑", "反派现身"]

### 人名地名

- 说明: 所有人名和地名应保持一致
- 检测方式: 实体识别或fact_lock

### 数值信息

- 说明: 具体的数值信息应保留
- 示例: "三百年", "七十二变", "九九八十一难"

## 检查策略

1. **伏笔检查**: 比较原文和改写后的伏笔标记集合
2. **状态卡检查**: 比较状态卡数值
3. **关键事件检查**: 遍历fact_lock中的事件，检查是否保留
4. **风险等级**: 
   - `none`: 无风险
   - `low`: 改动比例低于70%阈值
   - `medium`: 改动比例在70%-100%阈值之间
   - `high`: 改动比例超过阈值
   - `critical`: 检测到事实破坏

## 配置项

```yaml
fact_protection:
  enabled: true
  fail_on_risk: true
  check_patterns:
    - foreshadowing
    - state_card
    - key_events
  risk_thresholds:
    change_ratio_warning: 0.25
    change_ratio_critical: 0.35
```
