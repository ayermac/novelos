id: humanizer-zh
name: Humanizer Chinese
version: "2.3.0"
kind: transform
class_name: HumanizerZhSkill
description: "去除中文文本中的AI生成痕迹，使其更自然"
enabled: true
builtin: true
package:
  name: humanizer_zh
  handler: handler.py
  entry_class: HumanizerZhSkill
  prompts_dir: prompts
  rules_dir: rules
  fixtures: tests/fixtures.yaml
allowed_agents:
  - polisher
  - manual
allowed_stages:
  - after_llm
  - manual
permissions:
  read_context: false
  read_chapter: false
  transform_text: true
  validate_text: false
  write_quality_report: false
  write_skill_run: true
  write_chapter_content: false
  update_chapter_status: false
  send_agent_message: false
  call_llm: false
  call_network: false
input_schema:
  type: object
  required:
    - text
  properties:
    text:
      type: string
      description: "要处理的文本内容"
    fact_lock:
      type: array
      description: "事实锁定列表"
      items:
        type: object
output_schema:
  type: object
  required:
    - humanized_text
  properties:
    humanized_text:
      type: string
      description: "处理后的文本"
    changes:
      type: array
      description: "修改列表"
      items:
        type: object
    risk_level:
      type: string
      enum:
        - none
        - low
        - high
      description: "风险等级"
config_schema:
  type: object
  properties:
    preserve_facts:
      type: boolean
      description: "是否保留事实"
    max_change_ratio:
      type: number
      description: "最大修改比例"
      minimum: 0
      maximum: 1
    fail_on_fact_risk:
      type: boolean
      description: "事实风险时是否失败"
default_config:
  preserve_facts: true
  max_change_ratio: 0.35
  fail_on_fact_risk: true
failure_policy:
  on_error: block
  max_retries: 0
  timeout_seconds: null
  blocking_threshold: null
