{% extends "base.html" %}

{% block content %}
<h1>Run Chapter Production</h1>

<form method="POST" action="/run/chapter" class="form">
    <div class="form-group">
        <label for="project_id">Project ID:</label>
        <select name="project_id" id="project_id" required>
            {% for p in projects %}
            <option value="{{ p.project_id }}" {% if project_id == p.project_id %}selected{% endif %}>
                {{ p.project_id }}
            </option>
            {% endfor %}
        </select>
    </div>

    <div class="form-group">
        <label for="chapter">Chapter Number:</label>
        <input type="number" name="chapter" id="chapter" value="{{ chapter or 1 }}" min="1" required>
    </div>

    <div class="form-group">
        <label for="llm_mode">LLM Mode:</label>
        <select name="llm_mode" id="llm_mode">
            <option value="stub" {% if llm_mode == 'stub' %}selected{% endif %}>stub (demo)</option>
            <option value="real" {% if llm_mode == 'real' %}selected{% endif %}>real</option>
        </select>
    </div>

    <div class="form-group">
        <label for="max_steps">Max Steps:</label>
        <input type="number" name="max_steps" id="max_steps" value="{{ max_steps or 20 }}" min="1" max="100">
    </div>

    <button type="submit" class="btn btn-primary">Run Chapter</button>
</form>

{% if result %}
<div class="result-panel">
    <h2>Result</h2>
    <pre>{{ result | tojson(indent=2) }}</pre>
</div>
{% endif %}
{% endblock %}
