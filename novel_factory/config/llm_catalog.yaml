# v3.9 LLM Model Catalog
# Offline catalog of LLM models with capability tags for agent recommendation.
# NOTE: No real API keys are stored here.

catalog:
  # ── OpenAI ──────────────────────────────────────────────────
  - provider: openai
    model: gpt-4o
    display_name: GPT-4o
    profile_template: openai_compatible
    context_window: 128000
    cost_tier: high
    latency_tier: medium
    quality_tier: premium
    strengths:
      - reasoning
      - planning
      - json
      - prose
      - editing
      - long_context
    recommended_agents:
      - planner
      - screenwriter
      - author
      - polisher
      - editor
      - continuity_checker
      - architect
    notes: "Flagship model, strong across all tasks."

  - provider: openai
