<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7f4ee"/>
      <stop offset="52%" stop-color="#eef5f2"/>
      <stop offset="100%" stop-color="#f3f0e8"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#223026" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: url(#bg); }
      .ink { fill: #24312b; font-family: "Avenir Next", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .muted { fill: #6c786f; font-family: "Avenir Next", "PingFang SC", "Microsoft YaHei", sans-serif; }
      .tiny { font-size: 17px; }
      .small { font-size: 20px; }
      .body { font-size: 24px; }
      .title { font-size: 42px; font-weight: 700; letter-spacing: 0; }
      .section { font-size: 25px; font-weight: 700; }
      .label { font-size: 18px; font-weight: 600; }
      .panel { fill: #fffdf8; stroke: #ded7c9; stroke-width: 1.4; filter: url(#softShadow); }
      .flat { fill: #fffdf8; stroke: #ded7c9; stroke-width: 1.2; }
      .nav { fill: #233129; }
      .navText { fill: #f4efe4; font-family: "Avenir Next", "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 22px; font-weight: 650; }
      .navDim { fill: #b8c3b8; font-family: "Avenir Next", "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 18px; }
      .accent { fill: #2f6f5e; }
      .accent2 { fill: #b75f3b; }
      .blue { fill: #315d8b; }
      .warn { fill: #b68a2a; }
      .ok { fill: #2f7d55; }
      .danger { fill: #a84b45; }
      .chip { fill: #eef4ef; stroke: #cad8cf; stroke-width: 1; }
      .chipText { fill: #365044; font-family: "Avenir Next", "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 17px; font-weight: 650; }
      .btn { fill: #2f6f5e; }
      .btn2 { fill: #edf2ee; stroke: #c8d6cd; stroke-width: 1; }
      .btnText { fill: #fffdf8; font-family: "Avenir Next", "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 18px; font-weight: 700; }
      .btnText2 { fill: #2e4a3d; font-family: "Avenir Next", "PingFang SC", "Microsoft YaHei", sans-serif; font-size: 18px; font-weight: 700; }
      .line { stroke: #d9d1c1; stroke-width: 1.2; }
      .progressBg { fill: #e9e1d2; }
      .progress { fill: #2f6f5e; }
      .mono { font-family: "SF Mono", "Menlo", "Consolas", monospace; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1000"/>

  <rect class="nav" x="0" y="0" width="1600" height="88"/>
  <text class="navText" x="44" y="55">Novel Factory</text>
  <text class="navDim" x="206" y="55">v4.8 Web Acceptance Console</text>
  <text class="navDim" x="1190" y="37">DB: acceptance_novel_factory.db</text>
  <text class="navDim" x="1190" y="63">LLM: stub</text>

  <rect class="panel" x="42" y="120" width="300" height="820" rx="8"/>
  <text class="section ink" x="72" y="165">项目工作台</text>
  <rect class="chip" x="72" y="190" width="168" height="34" rx="17"/>
  <text class="chipText" x="91" y="213">my-novel-001</text>

  <g transform="translate(72 255)">
    <rect class="accent" x="0" y="0" width="220" height="48" rx="6"/>
    <text class="btnText" x="20" y="31">项目总览</text>
    <text class="muted small" x="0" y="83">创建项目</text>
    <text class="muted small" x="0" y="125">单章运行</text>
    <text class="muted small" x="0" y="167">批次生产</text>
    <text class="muted small" x="0" y="209">队列监控</text>
    <text class="muted small" x="0" y="251">连载计划</text>
    <text class="muted small" x="0" y="293">Review 工作台</text>
    <text class="muted small" x="0" y="335">Style Bible</text>
    <text class="muted small" x="0" y="377">验收矩阵</text>
  </g>

  <text class="tiny muted" x="72" y="865">v4.8 目标：全部已实现能力</text>
  <text class="tiny muted" x="72" y="894">都有 Web 入口、测试和 DB 验证</text>

  <rect class="panel" x="380" y="120" width="760" height="270" rx="8"/>
  <text class="title ink" x="420" y="178">我的长篇小说</text>
  <text class="body muted" x="420" y="218">都市幻想 · 计划 500 章 · 当前第 1 章</text>
  <rect class="chip" x="420" y="250" width="120" height="36" rx="18"/>
  <text class="chipText" x="446" y="274">Style OK</text>
  <rect class="chip" x="556" y="250" width="152" height="36" rx="18"/>
  <text class="chipText" x="580" y="274">Queue idle</text>
  <rect class="chip" x="724" y="250" width="188" height="36" rx="18"/>
  <text class="chipText" x="748" y="274">Review pending</text>

  <rect class="btn" x="420" y="318" width="170" height="48" rx="6"/>
  <text class="btnText" x="448" y="349">生成第一章</text>
  <rect class="btn2" x="606" y="318" width="150" height="48" rx="6"/>
  <text class="btnText2" x="638" y="349">查看审核</text>
  <rect class="btn2" x="772" y="318" width="150" height="48" rx="6"/>
  <text class="btnText2" x="806" y="349">批次生产</text>
  <rect class="btn2" x="938" y="318" width="150" height="48" rx="6"/>
  <text class="btnText2" x="973" y="349">队列状态</text>

  <rect class="panel" x="1175" y="120" width="380" height="270" rx="8"/>
  <text class="section ink" x="1212" y="166">首次运行闭环</text>
  <circle class="ok" cx="1222" cy="210" r="8"/>
  <text class="small ink" x="1244" y="217">Onboarding 已完成</text>
  <circle class="ok" cx="1222" cy="254" r="8"/>
  <text class="small ink" x="1244" y="261">第 1 章可一键运行</text>
  <circle class="warn" cx="1222" cy="298" r="8"/>
  <text class="small ink" x="1244" y="305">Review 待处理</text>
  <circle class="blue" cx="1222" cy="342" r="8"/>
  <text class="small ink" x="1244" y="349">下一步：确认发布</text>

  <rect class="panel" x="380" y="420" width="560" height="250" rx="8"/>
  <text class="section ink" x="420" y="465">章节进度</text>
  <text class="small muted" x="420" y="502">planned → scripted → drafted → polished → review</text>
  <rect class="progressBg" x="420" y="532" width="450" height="18" rx="9"/>
  <rect class="progress" x="420" y="532" width="332" height="18" rx="9"/>
  <g transform="translate(420 590)">
    <rect class="flat" x="0" y="0" width="116" height="54" rx="6"/>
    <text class="label ok" x="22" y="34">01 review</text>
    <rect class="flat" x="132" y="0" width="116" height="54" rx="6"/>
    <text class="label accent" x="154" y="34">02 planned</text>
    <rect class="flat" x="264" y="0" width="116" height="54" rx="6"/>
    <text class="label accent" x="286" y="34">03 planned</text>
    <rect class="flat" x="396" y="0" width="116" height="54" rx="6"/>
    <text class="label accent" x="418" y="34">04 planned</text>
  </g>

  <rect class="panel" x="970" y="420" width="585" height="250" rx="8"/>
  <text class="section ink" x="1010" y="465">Review / 待办</text>
  <line class="line" x1="1010" y1="490" x2="1515" y2="490"/>
  <text class="small ink" x="1010" y="530">第 1 章：质量分 86 · 连续性通过 · Style warning 2</text>
  <rect class="btn" x="1010" y="558" width="120" height="42" rx="6"/>
  <text class="btnText" x="1046" y="585">Approve</text>
  <rect class="btn2" x="1144" y="558" width="156" height="42" rx="6"/>
  <text class="btnText2" x="1174" y="585">Request Fix</text>
  <rect class="btn2" x="1314" y="558" width="110" height="42" rx="6"/>
  <text class="btnText2" x="1348" y="585">Diff</text>
  <text class="tiny muted" x="1010" y="635">所有 POST 操作都必须验证真实 DB 状态变化</text>

  <rect class="panel" x="380" y="700" width="1175" height="240" rx="8"/>
  <text class="section ink" x="420" y="745">Web Acceptance Matrix</text>
  <text class="tiny muted" x="420" y="774">v4.8 用这张矩阵确认“已实现功能 + WebUI”全部验收完成</text>
  <line class="line" x1="420" y1="805" x2="1515" y2="805"/>
  <text class="label muted" x="430" y="834">能力</text>
  <text class="label muted" x="690" y="834">Web 入口</text>
  <text class="label muted" x="900" y="834">成功路径</text>
  <text class="label muted" x="1110" y="834">失败路径</text>
  <text class="label muted" x="1320" y="834">DB 验证</text>
  <line class="line" x1="420" y1="852" x2="1515" y2="852"/>
  <text class="small ink" x="430" y="886">Onboarding / Run / Batch / Queue / Serial</text>
  <text class="small ok" x="710" y="886">通过</text>
  <text class="small ok" x="920" y="886">通过</text>
  <text class="small warn" x="1130" y="886">补齐中</text>
  <text class="small ok" x="1340" y="886">通过</text>
  <text class="small ink" x="430" y="922">Review / Style Bible / Style Gate / Samples / Proposals</text>
  <text class="small ok" x="710" y="922">通过</text>
  <text class="small ok" x="920" y="922">通过</text>
  <text class="small ok" x="1130" y="922">通过</text>
  <text class="small ok" x="1340" y="922">通过</text>
</svg>
